<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leba Admin</title>
<style>
:root{--bg:#070b14;--panel:#0f1628;--panel2:#141e33;--line:#1e2d44;
--text:#e8eefc;--muted:#8fa3c1;--accent:#6ea8fe;--ok:#3ddc97;
--warn:#ffc857;--bad:#ff6b6b;--shadow:0 8px 32px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
button,input,select,textarea{font:inherit}

/* Layout */
.shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.side{background:rgba(10,14,26,.95);border-right:1px solid var(--line);padding:1.25rem 1rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:1.5rem 2rem 3rem;overflow-y:auto}
@media(max-width:900px){.shell{grid-template-columns:1fr}.side{height:auto;position:relative;border-right:none;border-bottom:1px solid var(--line)}}

/* Brand */
.brand{display:flex;gap:.75rem;align-items:center;margin-bottom:1.5rem;padding:.25rem .4rem}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6ea8fe,#3ddc97);display:grid;place-items:center;font-weight:800;color:#041018;font-size:1.1rem}
.brand h1{font-size:1rem;font-weight:700}.brand p{color:var(--muted);font-size:.75rem;margin-top:2px}

/* Nav */
.nav{display:flex;flex-direction:column;gap:4px}
.nav button{text-align:left;background:transparent;border:1px solid transparent;color:var(--muted);padding:.65rem .85rem;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .15s}
.nav button:hover{background:var(--panel2);color:var(--text)}
.nav button.active{background:linear-gradient(90deg,rgba(110,168,254,.15),transparent);border-color:rgba(110,168,254,.2);color:var(--text);font-weight:600}

/* Components */
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:.55rem 1rem;cursor:pointer;font-size:.85rem;transition:all .15s}
.btn:hover{border-color:var(--accent)}.btn.primary{background:linear-gradient(135deg,#3b82f6,#2563eb);border-color:transparent;color:#fff}
.btn.ok{color:var(--ok);border-color:rgba(61,220,151,.3)}.btn.warn{color:var(--warn);border-color:rgba(255,200,87,.3)}
.btn.bad{color:var(--bad);border-color:rgba(255,107,107,.3)}.btn.sm{padding:.35rem .6rem;font-size:.78rem}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.1rem;box-shadow:var(--shadow);margin-bottom:1rem}
.card h3{margin:0 0 .5rem;font-size:1rem}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.panel h3{margin:0 0 1rem;font-size:1.05rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.85rem;margin-bottom:1.25rem}
.stat-card{background:linear-gradient(180deg,rgba(20,30,51,.9),var(--panel));border:1px solid var(--line);border-radius:14px;padding:1rem 1.1rem}
.stat-card .label{color:var(--muted);font-size:.75rem;margin-bottom:.3rem}
.stat-card .value{font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
.stat-card .sub{color:var(--muted);font-size:.72rem;margin-top:.3rem}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:.6rem .55rem;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
tr:hover td{background:rgba(255,255,255,.02)}
.pill{display:inline-flex;padding:.2rem .55rem;border-radius:999px;font-size:.72rem;font-weight:600;background:rgba(30,45,68,.6);border:1px solid var(--line)}
.pill.up{color:var(--ok);border-color:rgba(61,220,151,.3)}.pill.down{color:var(--bad);border-color:rgba(255,107,107,.3)}
.pill.drain{color:var(--warn);border-color:rgba(255,200,87,.3)}
.row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82rem}
.muted{color:var(--muted)}
.actions{display:flex;gap:4px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .5rem;border-radius:8px;font-size:.72rem;font-weight:600;background:var(--panel2);border:1px solid var(--line)}
.badge.admin{color:var(--accent)}.badge.operator{color:var(--warn)}.badge.viewer{color:var(--muted)}
input,select{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:.6rem .8rem}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:1rem 0}
.form-grid label{display:block;color:var(--muted);font-size:.78rem;margin-bottom:.3rem}
.form-grid input,.form-grid select{width:100%}
.toast{position:fixed;right:1.5rem;bottom:1.5rem;background:var(--panel2);border:1px solid var(--line);padding:.8rem 1.2rem;border-radius:12px;box-shadow:var(--shadow);display:none;max-width:400px;z-index:50;font-size:.88rem}
.toast.show{display:block}.toast.err{border-color:rgba(255,107,107,.4);color:var(--bad)}
.chart-wrap{height:100px;display:flex;align-items:flex-end;gap:3px;padding:.5rem 0}
.chart-bar{flex:1;background:linear-gradient(180deg,rgba(110,168,254,.7),rgba(110,168,254,.15));border-radius:3px 3px 0 0;min-width:3px;transition:height .3s}
.notice{border:1px solid rgba(255,200,87,.3);background:rgba(255,200,87,.06);color:#ffe4a3;border-radius:10px;padding:.75rem;font-size:.82rem;margin:.8rem 0}
.host-card{border-left:3px solid var(--accent)}
.host-card.degraded{border-left-color:var(--bad)}

/* RBAC */
body.role-viewer .op-only,body.role-viewer .admin-only{display:none !important}
body.role-operator .admin-only{display:none !important}
</style>
</head>
<body>
<div class="shell">
<div class="side">
  <div class="brand">
    <div class="logo">L</div>
    <div><h1>Leba</h1><p>Load balancer control plane</p></div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div style="margin-top:auto;padding-top:1.5rem;border-top:1px solid var(--line);margin-top:1.5rem">
    <div class="row" style="justify-content:space-between">
      <span class="badge" id="roleBadge"></span>
      <button class="btn sm" onclick="doLogout()">Logout</button>
    </div>
    <div class="muted" style="font-size:.72rem;margin-top:.5rem" id="sync">Connecting...</div>
  </div>
</div>
<div class="main" id="view">Loading...</div>
</div>
<div class="toast" id="toast"></div>

<script>
let DATA=null,TAB='overview',ROLE='',USER='',PREV_REQ=0;
const RATE=[];

function $(s){return document.querySelector(s)}
function $$(s){return document.querySelectorAll(s)}
function esc(h){return String(h||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c))}
function fmtBytes(n){n=+n||0;if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB'}
function fmtUp(ms){const s=Math.floor((ms||0)/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h+'h '+m+'m '+(s%60)+'s'}
function pill(s){return +s.drain?'<span class="pill drain">DRAIN</span>':+s.alive?'<span class="pill up">UP</span>':'<span class="pill down">DOWN</span>'}
function toast(m,err){const t=$('#toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.classList.remove('show'),3000)}

async function api(path,method){
  const r=await fetch(path,{method:method||'GET',credentials:'same-origin'});
  if(r.status===401){window.location.href='/login';return}
  const t=await r.text();let j;try{j=JSON.parse(t)}catch(e){j={raw:t}}
  if(!r.ok)throw new Error(j.error||t||'HTTP '+r.status);
  return j;
}

async function fetchRole(){
  try{const r=await api('/stats/whoami');ROLE=r.role||'viewer';USER=r.user||'';
  document.body.className='role-'+ROLE;
  $('#roleBadge').textContent=USER+' · '+ROLE;$('#roleBadge').classList.add(ROLE)}catch(e){}
}

async function refresh(){
  try{DATA=await api('/stats');
  const cur=+(DATA.total_req||0);if(PREV_REQ>0){RATE.push(cur-PREV_REQ);if(RATE.length>40)RATE.shift()}PREV_REQ=cur;
  render();$('#sync').textContent='Live · '+new Date().toLocaleTimeString()}
  catch(e){$('#sync').textContent='Offline';toast('Refresh failed: '+e.message,1)}
}

function nav(tab){TAB=tab;$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render()}

function render(){
  const v=$('#view');if(!v)return;
  const views={overview:viewOverview,servers:viewServers,hosts:viewHosts,backends:viewBackends,
    frontends:viewFrontends,platform:viewPlatform,analytics:viewAnalytics,config:viewConfig,api:viewAPI};
  const fn=views[TAB];
  if(fn)v.innerHTML=fn();
  else if(TAB==='analyticsData'){loadAnalyticsData()}
}

// ---- Views ----
function metrics(){
  if(!DATA)return '';const d=DATA,up=d.uptime_ms||0;
  const rate=RATE.length?RATE[RATE.length-1]:0;
  return `<div class="grid" style="grid-template-columns:repeat(6,1fr)">
  <div class="stat-card"><div class="label">Requests</div><div class="value">${d.total_req||0}</div><div class="sub">lifetime</div></div>
  <div class="stat-card"><div class="label">Errors</div><div class="value">${d.total_err||0}</div><div class="sub">denied ${d.denied||0}</div></div>
  <div class="stat-card"><div class="label">Active</div><div class="value">${d.active_conns||0}</div><div class="sub">rate-limited ${d.rate_limited||0}</div></div>
  <div class="stat-card"><div class="label">Rate</div><div class="value">${rate}</div><div class="sub">req/poll</div></div>
  <div class="stat-card"><div class="label">Latency</div><div class="value">${d.last_latency_ms||0}<small>ms</small></div><div class="sub">max ${d.max_latency_ms||0}ms</div></div>
  <div class="stat-card"><div class="label">Uptime</div><div class="value" style="font-size:1.1rem">${fmtUp(up)}</div><div class="sub">${fmtBytes(d.bytes_out||0)} out</div></div>
  </div>`;
}

function viewOverview(){
  if(!DATA)return '<div class="panel">Loading...</div>';const d=DATA;
  const ready=(d.servers||[]).some(s=>+s.alive&&!+s.drain);
  const sites=(d.routes||[]).filter(r=>r.kind==='host');
  let h=metrics();
  // Sites
  h+='<div class="panel"><h3>Sites</h3><table><tr><th>Domain</th><th>Backend</th><th>Servers</th><th>Status</th></tr>';
  sites.forEach(r=>{
    const srvs=(d.servers||[]).filter(s=>s.backend===r.backend);
    const up=srvs.filter(s=>+s.alive&&!+s.drain).length;
    const ok=up===srvs.length&&srvs.length>0;
    h+=`<tr><td><a href="https://${esc(r.value)}" target="_blank">🔒 ${esc(r.value)}</a></td>
    <td>${esc(r.backend)}</td><td>${up}/${srvs.length}</td>
    <td>${ok?'<span class="pill up">HEALTHY</span>':'<span class="pill down">DEGRADED</span>'}</td></tr>`;
  });
  if(!sites.length)h+='<tr><td colspan=4 class="muted">No host routes. Go to Proxy Hosts to add one.</td></tr>';
  h+='</table></div>';
  // Chart
  h+='<div class="panel"><h3>Request rate</h3><div class="chart-wrap" id="rateChart"></div><div class="muted" style="font-size:.72rem">'+RATE.length+' samples</div></div>';
  setTimeout(renderChart,0);
  return h;
}

function renderChart(){
  const el=$('#rateChart');if(!el||!RATE.length)return;
  const mx=Math.max(1,...RATE);
  el.innerHTML=RATE.map(v=>`<div class="chart-bar" style="height:${Math.max(2,v/mx*100)}%"></div>`).join('');
}

function viewServers(){
  if(!DATA)return '';const d=DATA;
  let h=metrics()+'<div class="panel"><div class="row" style="justify-content:space-between;margin-bottom:.8rem"><h3 style="margin:0">Servers</h3>';
  h+='<button class="btn sm op-only" onclick="reloadServers()">Reload servers_file</button></div>';
  h+='<table><tr><th>Backend</th><th>Server</th><th>Address</th><th>DNS</th><th>State</th><th>Conns</th><th>Req</th><th>Err</th><th>Bytes</th><th class="op-only">Actions</th></tr>';
  (d.servers||[]).forEach(s=>{
    const dns=+s.resolve_srv?'srv':(+s.resolve_expand?'expand':(+s.resolve?'resolve':(+s.resolve_parent?'member':'—')));
    h+=`<tr><td>${esc(s.backend)}</td><td><strong>${esc(s.name)}</strong></td><td class="mono">${esc(s.host)}:${s.port}</td>
    <td>${dns==='—'?dns:`<span class="pill">${dns}</span>`}</td>
    <td>${pill(s)}</td><td>${s.conns}</td><td>${s.total_req}</td><td>${s.total_err}</td><td>${fmtBytes(s.total_bytes)}</td>
    <td class="op-only actions">
      <button class="btn sm ${+s.drain?'ok':'warn'}" onclick="act('${+s.drain?'ready':'drain'}','${esc(s.backend)}','${esc(s.name)}')">${+s.drain?'Ready':'Drain'}</button>
      <button class="btn sm ${+s.alive?'bad':'ok'}" onclick="act('${+s.alive?'disable':'enable'}','${esc(s.backend)}','${esc(s.name)}')">${+s.alive?'Disable':'Enable'}</button>
    </td></tr>`;
  });
  h+='</table></div>';return h;
}

function viewHosts(){
  if(!DATA)return '';const d=DATA;
  const hosts=(d.routes||[]).filter(r=>r.kind==='host');
  const http=(d.frontends||[]).filter(f=>f.mode==='http');
  const feOpts=http.map(f=>`<option value="${esc(f.name)}">${esc(f.name)} :${f.port}</option>`).join('');

  let h=`<div class="row" style="justify-content:space-between;margin-bottom:1.25rem">
    <h2 style="margin:0">Proxy Hosts</h2>
    <button class="btn primary op-only" onclick="$('#addForm').style.display=$('#addForm').style.display==='none'?'block':'none'">+ Add proxy host</button></div>`;

  // Add form
  h+=`<div id="addForm" class="panel op-only" style="display:none;border-color:var(--accent)">
    <h3>New proxy host</h3>
    <div class="form-grid">
      <div><label>Domain name</label><input id="vhDomain" placeholder="app.example.com"></div>
      <div><label>Frontend</label><select id="vhFe">${feOpts}</select></div>
      <div><label>Backend name</label><input id="vhBackend" placeholder="my-app"></div>
      <div><label>Server name</label><input id="vhServer" placeholder="app1"></div>
      <div><label>Forward to (host:port)</label><input id="vhAddr" placeholder="127.0.0.1:3000"></div>
      <div><label>TLS certificate (optional)</label><input id="vhCert" placeholder="/etc/letsencrypt/live/…/fullchain.pem"></div>
      <div><label>TLS key (optional)</label><input id="vhKey" placeholder="/etc/letsencrypt/live/…/privkey.pem"></div>
    </div>
    <div class="row" style="justify-content:flex-end;margin-top:.8rem">
      <button class="btn" onclick="$('#addForm').style.display='none'">Cancel</button>
      <button class="btn primary" onclick="addHost()">Create</button>
    </div></div>`;

  // Host cards
  hosts.forEach(r=>{
    const srvs=(d.servers||[]).filter(s=>s.backend===r.backend);
    const be=(d.backends||[]).find(b=>b.name===r.backend);
    const up=srvs.filter(s=>+s.alive&&!+s.drain).length;
    const fe=http.find(f=>f.name===r.frontend);
    const tls=fe&&fe.tls_cert;const ok=up===srvs.length&&srvs.length>0;

    h+=`<div class="card host-card ${ok?'':'degraded'}">
      <div class="row" style="justify-content:space-between;margin-bottom:.75rem">
        <div>
          <h3 style="font-size:1.1rem">${tls?'🔒':'⚠️'} <a href="https://${esc(r.value)}" target="_blank">${esc(r.value)}</a></h3>
          <span class="muted" style="font-size:.8rem">→ ${esc(r.backend)} · ${be?esc(be.balance):'—'} · ${fe?'port '+fe.port:''}</span>
        </div>
        <span class="pill ${ok?'up':'down'}">${up}/${srvs.length} UP</span>
      </div>
      <table><tr><th>Server</th><th>Address</th><th>State</th><th>Requests</th><th>Bytes</th><th class="op-only">Actions</th></tr>`;
    srvs.forEach(s=>{
      h+=`<tr><td><strong>${esc(s.name)}</strong></td><td class="mono">${esc(s.host)}:${s.port}</td>
      <td>${pill(s)}</td><td>${s.total_req}</td><td>${fmtBytes(s.total_bytes)}</td>
      <td class="op-only actions">
        <button class="btn sm ${+s.drain?'ok':'warn'}" onclick="act('${+s.drain?'ready':'drain'}','${esc(s.backend)}','${esc(s.name)}')">${+s.drain?'Ready':'Drain'}</button>
        <button class="btn sm ${+s.alive?'bad':'ok'}" onclick="act('${+s.alive?'disable':'enable'}','${esc(s.backend)}','${esc(s.name)}')">${+s.alive?'Disable':'Enable'}</button>
      </td></tr>`;
    });
    if(!srvs.length)h+='<tr><td colspan=6 class="muted">No servers</td></tr>';
    h+=`</table>
      <div class="row op-only" style="justify-content:flex-end;margin-top:.75rem">
        <button class="btn sm bad" onclick="deleteHost('${esc(r.frontend)}','${esc(r.value)}')">Delete host</button>
      </div>
    </div>`;
  });
  if(!hosts.length)h+='<div class="panel"><p class="muted">No proxy hosts configured. Click + Add proxy host to get started.</p></div>';
  return h;
}

function viewBackends(){
  if(!DATA)return '';const d=DATA;
  let h='<div class="panel"><h3>Backends</h3><table><tr><th>Name</th><th>Balance</th><th>Stick</th><th>DNS</th><th>Servers</th><th>Up</th><th>Health</th></tr>';
  (d.backends||[]).forEach(b=>{
    const stick=b.stick_on?`<span class="pill up">on ${esc(b.stick_on)}</span>`:'off';
    const dns=b.resolve_interval_ms?`<span class="pill">${b.resolve_interval_ms}ms</span>`:'—';
    h+=`<tr><td><strong>${esc(b.name)}</strong></td><td>${esc(b.balance)}</td><td>${stick}</td><td>${dns}</td>
    <td>${b.servers}</td><td>${b.up}</td><td class="mono">${esc(b.health_path||'—')}</td></tr>`;
  });
  h+='</table></div>';
  h+='<div class="panel"><h3>Stick tables</h3><p class="muted" style="margin-bottom:.8rem">Source-IP stick (<code>stick on src</code>) applies on cleartext, TLS, and HTTP/3 (H3 uses XFF or cookie; shared table + peers). Peers sync is configured in <code>leba.conf</code>.</p>';
  h+='<table><tr><th>Backend</th><th>stick_on</th><th>Size</th><th>Expire</th></tr>';
  (d.backends||[]).filter(b=>b.stick_on).forEach(b=>{
    h+=`<tr><td>${esc(b.name)}</td><td class="mono">${esc(b.stick_on)}</td><td>${b.stick_size||100000}</td><td>${b.stick_expire_ms||0}ms</td></tr>`;
  });
  if(!(d.backends||[]).some(b=>b.stick_on))h+='<tr><td colspan=4 class="muted">No backends with stick tables</td></tr>';
  h+='</table></div>';return h;
}

function viewFrontends(){
  if(!DATA)return '';const d=DATA;
  let h='<div class="panel"><h3>Frontends</h3><table><tr><th>Name</th><th>Bind</th><th>Mode</th><th>TLS / SNI</th><th>WAF</th><th>Auth</th><th>ACME</th><th>Protocols</th><th>Rate</th></tr>';
  (d.frontends||[]).forEach(f=>{
    const sni=(f.tls_sni||[]).length;
    const tls=f.tls_cert?(sni?`<span class="pill up">TLS+${sni} SNI</span>`:'<span class="pill up">TLS</span>'):'off';
    const waf=f.waf_mode&&f.waf_mode!=='off'?`<span class="pill warn">${esc(f.waf_mode)}</span>`:'off';
    h+=`<tr><td><strong>${esc(f.name)}</strong></td><td class="mono">${esc(f.bind_host||'')}:${f.port}</td><td><span class="pill">${esc(f.mode)}</span></td>
    <td>${tls}</td><td>${waf}</td>
    <td>${f.auth_basic_realm?'<span class="pill warn">Basic</span>':'off'}</td>
    <td>${f.acme_webroot?'<span class="pill up" title="'+esc(f.acme_webroot)+'">webroot</span>':'—'}</td>
    <td class="mono">${esc(f.protocols||'http/1.1')}</td>
    <td>${f.rate_limit||0}/s</td></tr>`;
  });
  h+='</table></div>';
  // SNI table
  h+='<div class="panel"><h3>TLS SNI certificates</h3>';
  let sniRows='';
  (d.frontends||[]).forEach(f=>{(f.tls_sni||[]).forEach(s=>{
    sniRows+=`<tr><td>${esc(f.name)}</td><td class="mono">${esc(s.hostname)}</td><td class="mono">${esc(s.cert)}</td></tr>`;
  })});
  if(sniRows){
    h+='<table><tr><th>Frontend</th><th>Hostname</th><th>Cert path</th></tr>'+sniRows+'</table>';
  }else h+='<p class="muted">No multi-cert SNI entries. Use proxy-host cert+domain or <code>tls_sni HOST CERT KEY</code>.</p>';
  h+='</div>';
  h+='<div class="panel"><h3>Routes</h3><table><tr><th>Frontend</th><th>Kind</th><th>Match</th><th>Backend</th><th>Status</th></tr>';
  (d.routes||[]).forEach(r=>{
    const srvs=(d.servers||[]).filter(s=>s.backend===r.backend);
    const up=srvs.filter(s=>+s.alive&&!+s.drain).length;
    const link=r.kind==='host'?`<a href="https://${esc(r.value)}" target="_blank">${esc(r.value)}</a>`:esc(r.value||'(catch-all)');
    h+=`<tr><td>${esc(r.frontend)}</td><td><span class="pill">${esc(r.kind)}</span></td><td class="mono">${link}</td>
    <td>${esc(r.backend)}</td><td>${up}/${srvs.length} UP</td></tr>`;
  });
  h+='</table></div>';return h;
}

function viewPlatform(){
  if(!DATA)return '';const d=DATA;
  const srvs=d.servers||[],bes=d.backends||[],fes=d.frontends||[];
  const dns=srvs.filter(s=>+s.resolve||+s.resolve_expand||+s.resolve_srv);
  const stick=bes.filter(b=>b.stick_on);
  const sni=fes.reduce((n,f)=>n+(f.tls_sni||[]).length,0);
  const waf=fes.filter(f=>f.waf_mode&&f.waf_mode!=='off'&&f.waf_mode!=='');
  let h=metrics();
  h+=`<div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1rem">
    <div class="stat-card"><div class="label">DNS discovery</div><div class="value">${dns.length}</div><div class="sub">resolve / expand / srv</div></div>
    <div class="stat-card"><div class="label">Stick tables</div><div class="value">${stick.length}</div><div class="sub">backends with stick on</div></div>
    <div class="stat-card"><div class="label">TLS SNI</div><div class="value">${sni}</div><div class="sub">extra cert entries</div></div>
    <div class="stat-card"><div class="label">WAF frontends</div><div class="value">${waf.length}</div><div class="sub">detect / block</div></div>
  </div>`;
  h+='<div class="panel"><h3>DNS service discovery</h3>';
  h+='<table><tr><th>Backend</th><th>Server</th><th>Mode</th><th>Resolve name</th><th>Live host</th><th>Parent</th></tr>';
  dns.forEach(s=>{
    const mode=+s.resolve_srv?'SRV':(+s.resolve_expand?'expand':(+s.resolve?'resolve':''));
    h+=`<tr><td>${esc(s.backend)}</td><td>${esc(s.name)}</td><td><span class="pill">${mode}</span></td>
    <td class="mono">${esc(s.resolve_name||'—')}</td><td class="mono">${esc(s.host)}:${s.port}</td>
    <td class="mono">${esc(s.resolve_parent||'—')}</td></tr>`;
  });
  if(!dns.length)h+='<tr><td colspan=6 class="muted">No servers with <code>resolve</code> / <code>expand</code> / <code>srv</code></td></tr>';
  h+='</table><p class="muted" style="margin-top:.75rem;font-size:.8rem">Configure in backend server lines. See docs/DNS.md.</p></div>';

  h+='<div class="panel"><h3>WAF</h3><table><tr><th>Frontend</th><th>Mode</th><th>Remote URL</th><th>Fail policy</th></tr>';
  fes.forEach(f=>{
    if(!f.waf_mode||f.waf_mode==='off')return;
    h+=`<tr><td>${esc(f.name)}</td><td><span class="pill warn">${esc(f.waf_mode)}</span></td>
    <td class="mono">${esc(f.waf_url||'local only')}</td><td>${esc(f.waf_fail||'open')}</td></tr>`;
  });
  if(!waf.length)h+='<tr><td colspan=4 class="muted">WAF off on all frontends. Use <code>waf detect|block</code>.</td></tr>';
  h+='</table></div>';

  h+='<div class="panel"><h3>Operations</h3><div class="row op-only" style="gap:.6rem;flex-wrap:wrap">';
  h+='<button class="btn primary" onclick="tlsReload()">TLS reload</button>';
  h+='<button class="btn primary" onclick="fullReload()">Full config reload</button>';
  h+='<button class="btn" onclick="reloadServers()">Reload servers_file</button>';
  h+='</div><p class="muted" style="margin-top:.75rem;font-size:.8rem">Full reload rebinds HTTP/TCP/UDP/H3/stats/peers and re-applies OIDC discovery. Configure peers &amp; OIDC in <code>leba.conf</code>.</p></div>';

  h+='<div class="panel"><h3>Enterprise features</h3><table><tr><th>Feature</th><th>Status</th><th>Notes</th></tr>';
  h+=`<tr><td>Multi-cert SNI</td><td>${sni?'<span class="pill up">ACTIVE</span>':'<span class="pill">config</span>'}</td><td>tls_sni / proxy-host cert</td></tr>`;
  h+=`<tr><td>Stick tables (H1/H2/H3)</td><td>${stick.length?'<span class="pill up">ACTIVE</span>':'<span class="pill">config</span>'}</td><td>stick on src · cookie · peers</td></tr>`;
  h+=`<tr><td>DNS resolve / expand / SRV</td><td>${dns.length?'<span class="pill up">ACTIVE</span>':'<span class="pill">config</span>'}</td><td>docs/DNS.md</td></tr>`;
  h+=`<tr><td>WAF adapter</td><td>${waf.length?'<span class="pill up">ACTIVE</span>':'<span class="pill">config</span>'}</td><td>local + remote inspect</td></tr>`;
  h+=`<tr><td>Stick peers (HA)</td><td><span class="pill">config</span></td><td>peers section · docs/HA.md</td></tr>`;
  const oidc=d.oidc||{};const peers=d.peers||{};
  h+=`<tr><td>Admin OIDC SSO</td><td>${oidc.ready?'<span class="pill up">READY</span>':(oidc.enabled?'<span class="pill">enabled</span>':'<span class="pill">off</span>')}</td><td>${esc(oidc.issuer||'oidc section')} · /oidc/login</td></tr>`;
  h+=`<tr><td>Stick peers</td><td>${peers.ready?'<span class="pill up">READY</span>':(peers.enabled?'<span class="pill">enabled</span>':'<span class="pill">off</span>')}</td><td>${esc(peers.name||'—')} / ${esc(peers.cluster||'—')} · remotes ${peers.remote_count||0}</td></tr>`;
  h+=`<tr><td>Listener rebind</td><td><span class="pill up">HTTP/TCP/UDP/H3/stats/peers</span></td><td>SIGHUP / POST /admin/reload · OIDC re-discover</td></tr>`;
  h+='</table></div>';
  return h;
}

function viewAnalytics(){return '<div class="panel"><h3>Loading analytics...</h3></div>';}
async function loadAnalyticsData(){
  const v=$('#view');if(!v)return;v.innerHTML='<div class="panel">Loading analytics...</div>';
  try{const d=await api('/stats/analytics');const s=d.status||{};const total=d.total_lines||1;
  let h=`<div class="grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="stat-card"><div class="label">Requests</div><div class="value">${d.total_lines||0}</div></div>
    <div class="stat-card"><div class="label">2xx OK</div><div class="value" style="color:var(--ok)">${s['2xx']||0}</div></div>
    <div class="stat-card"><div class="label">4xx</div><div class="value" style="color:var(--warn)">${s['4xx']||0}</div></div>
    <div class="stat-card"><div class="label">5xx</div><div class="value" style="color:var(--bad)">${s['5xx']||0}</div></div></div>`;
  h+='<div class="panel"><h3>Top paths</h3><table><tr><th>#</th><th>Path</th><th>Hits</th><th>Share</th></tr>';
  (d.top_paths||[]).forEach((p,i)=>{
    const pct=((p.count/total)*100).toFixed(1);
    h+=`<tr><td>${i+1}</td><td class="mono">${esc(p.path)}</td><td><strong>${p.count}</strong></td>
    <td><div style="display:flex;align-items:center;gap:.5rem"><div style="background:var(--accent);height:6px;border-radius:3px;width:${pct}%"></div>${pct}%</div></td></tr>`;
  });
  h+=`</table></div><div class="muted" style="font-size:.78rem">Last 2000 entries · ${fmtBytes(d.total_bytes||0)} transferred</div>`;
  v.innerHTML=h;}catch(e){v.innerHTML='<div class="panel"><h3>Error</h3><p>'+esc(e.message)+'</p></div>';}
}

function viewConfig(){
  const fes=DATA?.frontends||[];
  const acme=fes.filter(f=>f.acme_webroot);
  const basic=fes.filter(f=>f.auth_basic_realm);
  const sni=fes.reduce((n,f)=>n+(f.tls_sni||[]).length,0);
  const waf=fes.filter(f=>f.waf_mode&&f.waf_mode!=='off');
  return `<div class="panel"><h3>Security status</h3>
  <table><tr><th>Setting</th><th>Status</th></tr>
  <tr><td>TLS</td><td>${fes.some(f=>f.tls_cert)?'<span class="pill up">ENABLED</span>':'<span class="pill down">OFF</span>'}</td></tr>
  <tr><td>Multi-cert SNI</td><td>${sni?'<span class="pill up">'+sni+' entr'+(sni===1?'y':'ies')+'</span>':'none'}</td></tr>
  <tr><td>Admin auth</td><td><span class="pill up">SESSION + Basic</span></td></tr>
  <tr><td>OIDC SSO</td><td>${(d.oidc&&d.oidc.ready)?'<span class="pill up">ready</span>':(d.oidc&&d.oidc.enabled)?'enabled':'off'} · /oidc/login</td></tr>
  <tr><td>Stick peers</td><td>${(d.peers&&d.peers.ready)?'<span class="pill up">ready</span>':(d.peers&&d.peers.enabled)?'enabled':'off'} · remotes ${(d.peers&&d.peers.remote_count)||0}</td></tr>
  <tr><td>App HTTP Basic</td><td>${basic.length?'<span class="pill up">'+basic.length+' frontend(s)</span>':'off'}</td></tr>
  <tr><td>WAF</td><td>${waf.length?'<span class="pill warn">'+waf.length+' frontend(s)</span>':'off'}</td></tr>
  <tr><td>ACME webroot</td><td>${acme.length?'<span class="pill up">'+acme.map(f=>esc(f.name)).join(', ')+'</span>':'not set'}</td></tr>
  <tr><td>RBAC</td><td><span class="pill up">ENFORCED</span></td></tr>
  <tr><td>Audit logging</td><td><span class="pill up">ON</span></td></tr></table></div>
  <div class="panel"><h3>TLS / ACME ops</h3>
  <div class="form-grid op-only">
    <div><label>Frontend</label><select id="certFe">${fes.filter(f=>f.mode==='http'||f.mode==='stats').map(f=>'<option value="'+esc(f.name)+'">'+esc(f.name)+'</option>').join('')}</select></div>
    <div><label>SNI hostname (optional)</label><input id="certHost" placeholder="api.example.com or *.example.com"></div>
    <div><label>Certificate path</label><input id="certPath" placeholder="/etc/leba/certs/fullchain.pem"></div>
    <div><label>Key path</label><input id="certKey" placeholder="/etc/leba/certs/privkey.pem"></div>
  </div>
  <div class="row op-only" style="gap:.6rem;margin-top:.5rem">
    <button class="btn primary" onclick="saveCert()">Save cert (default or SNI)</button>
    <button class="btn primary" onclick="tlsReload()">Live TLS reload</button>
    <button class="btn" onclick="fullReload()">Full config reload</button>
  </div>
  <p class="muted" style="margin-top:.8rem;font-size:.8rem;line-height:1.5">HTTP-01: <code>acme_webroot</code> + lego/certbot. After renew run TLS reload. Multi-cert: set hostname for SNI. See docs/ACME.md and docs/OIDC.md.</p>
  </div>
  <div class="panel"><h3>Admin guide</h3><div class="muted" style="line-height:1.6">
  <p><strong>OIDC:</strong> configure <code>oidc { … }</code>, then open <a href="/oidc/login">/oidc/login</a>.</p>
  <p><strong>Peers:</strong> <code>peers { … }</code> for stick-table HA sync (docs/HA.md).</p>
  <p><strong>App Basic:</strong> <code>auth_basic "Realm"</code> + <code>auth_user</code>.</p>
  <p><strong>Password:</strong> <code>leba admin hash-password NEW_PASS</code>.</p>
  </div></div>`;
}

// ---- Actions ----
async function act(action,be,srv){
  try{await api('/admin/'+action+'/'+encodeURIComponent(be)+'/'+encodeURIComponent(srv),'POST');
  toast(action+' '+be+'/'+srv+' OK');await refresh()}catch(e){toast(e.message,1)}
}

async function addHost(){
  const domain=$('#vhDomain')?.value,fe=$('#vhFe')?.value,be=$('#vhBackend')?.value;
  const srv=$('#vhServer')?.value,addr=$('#vhAddr')?.value;
  const cert=$('#vhCert')?.value||'',key=$('#vhKey')?.value||'';
  if(!domain||!be||!srv||!addr){toast('Fill in domain, backend, server, and address',1);return}
  try{
    const p='/admin/proxy-host?frontend='+encodeURIComponent(fe)+'&domain='+encodeURIComponent(domain)+
      '&backend='+encodeURIComponent(be)+'&server='+encodeURIComponent(srv)+'&addr='+encodeURIComponent(addr)+
      '&cert='+encodeURIComponent(cert)+'&key='+encodeURIComponent(key);
    const r=await api(p,'POST');toast('Created proxy host: '+domain);
    if(r.tls_reload||r.sni||r.tls_reload_recommended)toast('TLS/SNI applied live (or run TLS reload)',0);
    $('#addForm').style.display='none';await refresh();
  }catch(e){toast('Failed: '+e.message,1)}
}

async function deleteHost(fe,domain){
  if(!confirm('Delete proxy host '+domain+'?'))return;
  try{
    await api('/admin/proxy-host-delete?frontend='+encodeURIComponent(fe)+'&domain='+encodeURIComponent(domain),'POST');
    toast('Deleted '+domain);await refresh();
  }catch(e){toast(e.message,1)}
}

async function tlsReload(){
  try{await api('/admin/tls-reload','POST');toast('TLS reload requested');}
  catch(e){toast(e.message,1)}
}

async function fullReload(){
  try{const r=await api('/admin/reload','POST');toast('Full config reload: '+(r.action||'ok'));await refresh();}
  catch(e){toast(e.message,1)}
}

async function reloadServers(){
  try{const r=await api('/admin/reload-servers','POST');toast('Reloaded '+(r.loaded||0)+' servers_file entries');await refresh();}
  catch(e){toast(e.message,1)}
}

async function saveCert(){
  const fe=$('#certFe')?.value,cert=$('#certPath')?.value,key=$('#certKey')?.value,host=$('#certHost')?.value||'';
  if(!fe||!cert||!key){toast('Frontend, cert, and key required',1);return}
  try{
    let p='/admin/vhost-cert?frontend='+encodeURIComponent(fe)+'&cert='+encodeURIComponent(cert)+'&key='+encodeURIComponent(key);
    if(host)p+='&hostname='+encodeURIComponent(host);
    const r=await api(p,'POST');
    toast(r.sni?'SNI cert saved for '+host:'Default cert saved — TLS reload applied');
    await refresh();
  }catch(e){toast(e.message,1)}
}

async function doLogout(){window.location.href='/logout'}

const tabs=[
  ['overview','Overview'],['hosts','Proxy Hosts'],['servers','Servers'],
  ['backends','Backends'],['frontends','Frontends & Routes'],['platform','Platform'],
  ['analyticsData','Analytics'],['config','Security'],['api','API']
];
const navEl=$('#nav');
tabs.forEach(([id,label,cls])=>{
  const b=document.createElement('button');b.dataset.tab=id;b.textContent=label;
  if(cls)b.className=cls;
  b.onclick=()=>nav(id);navEl.appendChild(b);
});
nav('overview');
fetchRole();refresh();setInterval(refresh,2500);
</script>
