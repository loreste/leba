# Leba local development config.
# Docs: README.md

defaults
  timeout_client 30s
  timeout_server 30s
  timeout_connect 3s
  maxconn 10000
  retries 2
  workers 32

# Public HTTP edge
frontend web
  bind 18080
  mode http
  maxconn 5000
  rate_limit 5000/s
  sticky cookie LEBAID
  xff on
  access_log on
  # First match wins — no ACL spaghetti
  deny path_prefix /admin/secret
  route path_prefix /api -> api
  route path_prefix /static -> static
  route default -> web

# Ops dashboard
frontend stats
  bind 18404
  mode stats
  # Use hashed credentials in production:
  #   admin_user_hash admin SHA256HASH admin
  #   admin_users_file /etc/leba/users
  # Dev-only plaintext (doctor will reject placeholder passwords):
  admin_user admin s3cure-dev-0nly! admin
  admin_user viewer v1ew-dev-0nly! viewer
  admin_user operator 0ps-dev-0nly! operator

# Optional TCP (e.g. databases, redis) — enable when needed.
# frontend db
#   bind 13306
#   mode tcp
#   default_backend db

backend api
  balance least_conn
  maxconn 1000
  health_path /health
  health_interval 2s
  health_timeout 1s
  health_rise 2
  health_fall 3
  connect_timeout 3s
  retries 2
  server api1 127.0.0.1:19001 weight 100 maxconn 500 check
  server api2 127.0.0.1:19002 weight 100 maxconn 500 check

backend web
  balance round_robin
  health_path /health
  health_interval 2s
  health_timeout 1s
  health_rise 2
  health_fall 3
  server web1 127.0.0.1:19011 weight 50 maxconn 250 check
  server web2 127.0.0.1:19012 weight 50 maxconn 250 check

backend static
  balance ip_hash
  health_path /health
  health_interval 3s
  server static1 127.0.0.1:19021 weight 100 maxconn 200 check

# TLS example:
# frontend secure
#   bind 18443
#   mode http
#   tls_cert ./certs/dev.crt
#   tls_key  ./certs/dev.key
#   protocols http/1.1,h2,h3
#   backend api
