# Sample standby node for deploy/ha compose lab.
defaults
  timeout_client 30s
  timeout_server 30s
  timeout_connect 5s

frontend web
  bind 0.0.0.0:80
  mode http
  default_backend app

frontend stats
  bind 0.0.0.0:8404
  mode stats
  admin_users_file /etc/leba/admin-users.conf

backend app
  balance least_conn
  stick on src
  stick_table size 10000 expire 30m
  server origin 172.28.0.20:80 weight 1 check

peers
  enabled on
  name leba-b
  cluster edge
  bind 0.0.0.0:1024
  secret $LEBA_PEERS_SECRET
  peer leba-a 172.28.0.10:1024
