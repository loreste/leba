name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  # Pin to a known-good Mako (free-analysis path-local free). Override via workflow_dispatch inputs later.
  MAKO_GIT: https://github.com/loreste/mako
  # Leave empty to use latest main; set to a full SHA after Mako merges path-local free.
  MAKO_REV: ""

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Mako (pinned git or PATH)
        run: |
          set -euo pipefail
          if command -v mako >/dev/null 2>&1; then
            mako version
            exit 0
          fi
          if ! command -v cargo >/dev/null 2>&1; then
            echo "SKIP_MAKO=1" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ -n "${MAKO_REV}" ]]; then
            cargo install --git "$MAKO_GIT" --rev "$MAKO_REV" mako --locked
          else
            cargo install --git "$MAKO_GIT" mako --locked
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          mako version

      - name: Clean Mako object cache
        if: env.SKIP_MAKO != '1'
        run: rm -rf .mako/cache

      - name: Unit tests
        if: env.SKIP_MAKO != '1'
        run: make test

      - name: Build
        if: env.SKIP_MAKO != '1'
        run: make build

      - name: Linux deploy assets
        run: make test-linux-assets

      - name: HA package assets
        run: |
          test -f deploy/ha/README.md
          test -f deploy/ha/keepalived.conf.example
          test -f deploy/ha/docker-compose.ha.yml
          test -f deploy/ha/leba-healthcheck.sh

      - name: Soak harness
        if: env.SKIP_MAKO != '1'
        run: make test-soak

      - name: HA peers smoke
        if: env.SKIP_MAKO != '1'
        run: make test-ha-peers

      - name: Docs presence
        run: |
          test -f docs/PRODUCTION.md
          test -f docs/LIMITS.md
          test -f docs/ROADMAP.md
          test -f scripts/ha_peers_smoke.sh
