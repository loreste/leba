# Docker demo: proxy → origin service, admin on 8404.
# Used by docker-compose.yml one-command demo.
defaults
  timeout_client 30s
  timeout_server 30s
  timeout_connect 3s
  maxconn 10000
  retries 2
  workers 8
  state_file /var/lib/leba/state
  state_key ${LEBA_SESSION_SECRET}
  acme_webroot /var/lib/leba/acme
  acme_storage /var/lib/leba/lego
  acme_email ${LEBA_ACME_EMAIL}
  acme_helper lego

frontend web
  bind 8080
  mode http
  rate_limit 5000/s
  access_log on
  acme_webroot /var/lib/leba/acme
  route default -> app

frontend stats
  bind 8404
  mode stats
  admin_users_file /etc/leba/admin-users.conf

backend app
  balance least_conn
  health_path /
  health_interval 5s
  health_timeout 2s
  # Docker Compose service name "origin" (hashicorp/http-echo).
  server app1 origin:8080 weight 100 check
