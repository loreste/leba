name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mako
        run: |
          set -euo pipefail
          # Same approach as release.yml: clone + path install (cargo --git hits quiche submodule URL issues).
          git clone --depth 1 https://github.com/loreste/mako.git "$HOME/mako"
          cd "$HOME/mako"
          git submodule update --init --recursive || {
            echo "WARN: submodule init incomplete; continuing without full quiche tree"
          }
          if cargo install --path . --bin mako --locked 2>/tmp/mako-install.err; then
            echo "mako installed (locked)"
          else
            cat /tmp/mako-install.err || true
            cargo install --path . --bin mako
          fi
          echo "MAKO_STD=$HOME/mako/std" >> "$GITHUB_ENV"
          echo "MAKO_RUNTIME=$HOME/mako/runtime" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/mako" version
          test -d "$HOME/mako/std/crypto"
          test -d "$HOME/mako/runtime"

      - name: Clean Mako object cache
        run: rm -rf .mako/cache

      - name: Unit tests
        run: make test

      - name: Build
        run: make build

      - name: Linux deploy assets
        run: make test-linux-assets

      - name: HA package assets
        run: |
          test -f deploy/ha/README.md
          test -f deploy/ha/keepalived.conf.example
          test -f deploy/ha/docker-compose.ha.yml
          test -f deploy/ha/leba-healthcheck.sh

      - name: Soak harness
        run: make test-soak

      - name: HA peers smoke
        run: make test-ha-peers

      - name: Docs presence
        run: |
          test -f docs/PRODUCTION.md
          test -f docs/LIMITS.md
          test -f docs/ROADMAP.md
          test -f scripts/ha_peers_smoke.sh
