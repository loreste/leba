# /etc/leba/leba.conf
# Linux production template for Leba.
#
# Replace upstream addresses, hashed admin credentials, and TLS paths before deploying.
# Validate with: leba doctor /etc/leba/leba.conf

defaults
  timeout_client 30s
  timeout_server 30s
  timeout_connect 3s
  state_file /var/lib/leba/state
  maxconn 100000
  retries 2
  workers 32

# Public HTTP edge. The service unit grants CAP_NET_BIND_SERVICE for :80.
frontend web
  bind 80
  mode http
  maxconn 50000
  rate_limit 50000/s
  sticky cookie LEBAID
  xff on
  access_log on
  deny path_prefix /admin/secret
  route path_prefix /api -> api
  route path_prefix /static -> static
  route default -> web

# Ops dashboard. Bind this behind a firewall, VPN, or private interface.
frontend stats
  bind 18404
  mode stats
  admin_users_file /etc/leba/admin-users.conf

backend api
  balance least_conn
  maxconn 20000
  health_path /health
  health_interval 2s
  health_timeout 1s
  health_rise 2
  health_fall 3
  connect_timeout 3s
  retries 2
  server api1 10.0.10.11:8080 weight 100 maxconn 10000 check
  server api2 10.0.10.12:8080 weight 100 maxconn 10000 check

backend web
  balance round_robin
  maxconn 20000
  health_path /health
  health_interval 2s
  health_timeout 1s
  health_rise 2
  health_fall 3
  server web1 10.0.20.11:8080 weight 100 maxconn 10000 check
  server web2 10.0.20.12:8080 weight 100 maxconn 10000 check

backend static
  balance ip_hash
  maxconn 10000
  health_path /health
  health_interval 3s
  server static1 10.0.30.11:8080 weight 100 maxconn 10000 check

# Optional database/raw TCP listener. Enable when needed.
# frontend db
#   bind 13306
#   mode tcp
#   default_backend db
#
# backend db
#   balance least_conn
#   connect_timeout 3s
#   server db1 10.0.40.11:3306 weight 100 maxconn 10000 check
#   server db2 10.0.40.12:3306 weight 100 maxconn 10000 check

# TLS example:
# frontend secure
#   bind 443
#   mode http
#   tls_cert /etc/leba/tls/fullchain.pem
#   tls_key  /etc/leba/tls/privkey.pem
#   protocols http/1.1,h2
#   route default -> web
