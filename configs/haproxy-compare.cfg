global
  log stdout format raw local0

defaults
  mode http
  log global
  option httplog
  timeout connect 3s
  timeout client 30s
  timeout server 30s
  retries 2

frontend web
  bind :8080
  acl blocked_admin path_beg /admin/secret
  http-request deny deny_status 403 if blocked_admin
  use_backend api if { path_beg /api }
  use_backend static if { path_beg /static }
  default_backend web

frontend db
  bind :3306
  mode tcp
  default_backend db

backend api
  balance leastconn
  option httpchk GET /health
  server api1 host.docker.internal:19001 check maxconn 500
  server api2 host.docker.internal:19002 check maxconn 500

backend web
  balance roundrobin
  option httpchk GET /health
  server web1 host.docker.internal:19011 check maxconn 250
  server web2 host.docker.internal:19012 check maxconn 250

backend static
  balance source
  option httpchk GET /health
  server static1 host.docker.internal:19021 check maxconn 200

backend db
  mode tcp
  balance leastconn
  server db1 host.docker.internal:19100 check maxconn 500
