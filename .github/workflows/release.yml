name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/release (e.g. v0.14.0)"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Detect version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.tag }}"
          else
            REF="${GITHUB_REF_NAME}"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Mako
        run: |
          set -euo pipefail
          # Clone Mako; submodules (quiche) may be incomplete — build best-effort without H3 if needed.
          git clone --depth 1 https://github.com/loreste/mako.git "$HOME/mako"
          cd "$HOME/mako"
          git submodule update --init --recursive || {
            echo "WARN: submodule init incomplete; continuing without full quiche tree"
          }
          if cargo install --path . --bin mako --locked 2>/tmp/mako-install.err; then
            echo "mako installed (locked)"
          else
            cat /tmp/mako-install.err || true
            cargo install --path . --bin mako
          fi
          # Compiler needs std/runtime trees (not only the binary).
          echo "MAKO_STD=$HOME/mako/std" >> "$GITHUB_ENV"
          echo "MAKO_RUNTIME=$HOME/mako/runtime" >> "$GITHUB_ENV"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/mako" version
          test -d "$HOME/mako/std/crypto"
          test -d "$HOME/mako/runtime"

      - name: Build binary
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          export MAKO_STD="${MAKO_STD:-$HOME/mako/std}"
          export MAKO_RUNTIME="${MAKO_RUNTIME:-$HOME/mako/runtime}"
          make build
          mkdir -p dist
          cp leba "dist/leba-linux-amd64"
          chmod +x "dist/leba-linux-amd64"
          ./leba version || true

      - name: Checksums
        run: |
          cd dist
          sha256sum leba-linux-amd64 > SHA256SUMS
          cat SHA256SUMS

      - name: SBOM (CycloneDX-ish minimal)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cat > dist/sbom.cdx.json <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "version": 1,
            "metadata": {
              "component": {
                "type": "application",
                "name": "leba",
                "version": "${VERSION}",
                "purl": "pkg:generic/leba@${VERSION}"
              }
            },
            "components": [
              {
                "type": "library",
                "name": "mako",
                "description": "Language/runtime used to build Leba"
              }
            ]
          }
          EOF

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/leba-linux-amd64
            dist/SHA256SUMS
            dist/sbom.cdx.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        continue-on-error: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        continue-on-error: true

      - name: Login GHCR
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Dockerfile expects a prebuilt leba binary in context
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
