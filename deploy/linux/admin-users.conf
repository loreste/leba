# /etc/leba/admin-users.conf
# Format: USER HASH ROLE
# Generate a salted, iterated hash with:
#   leba admin hash-password 'strong-password'
#
# Replace every CHANGE_ME_* value before exposing the admin port.
CHANGE_ME_ADMIN CHANGE_ME_KDF_ADMIN_PASSWORD admin
CHANGE_ME_VIEWER CHANGE_ME_KDF_VIEWER_PASSWORD viewer
CHANGE_ME_OPERATOR CHANGE_ME_KDF_OPERATOR_PASSWORD operator
