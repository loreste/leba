# Docker demo config — proxy on 8080, admin on 8404.
defaults
  timeout_client 30s
  timeout_server 30s
  timeout_connect 3s
  maxconn 10000
  retries 2
  workers 16
  state_file /var/lib/leba/state
  state_key ${LEBA_SESSION_SECRET}
  acme_webroot /var/lib/leba/acme

frontend web
  bind 8080
  mode http
  rate_limit 5000/s
  access_log on
  acme_webroot /var/lib/leba/acme
  route default -> app

frontend stats
  bind 8404
  mode stats
  admin_users_file /etc/leba/admin-users.conf

backend app
  balance least_conn
  health_path /health
  health_interval 5s
  server app1 127.0.0.1:18080 weight 100 check
