# TLS-enabled edge example.
defaults
  timeout_client 30s
  timeout_connect 3s
  retries 2

frontend secure
  bind 18443
  mode http
  tls_cert ./certs/dev.crt
  tls_key  ./certs/dev.key
  # http/1.1 + h2 always; h3 when Mako is quiche-linked
  protocols http/1.1,h2,h3
  route path_prefix /api -> api
  route default -> api

frontend stats
  bind 18404
  mode stats

backend api
  balance least_conn
  health_path /health
  health_interval 2s
  server api1 127.0.0.1:19001 weight 100 check
  server api2 127.0.0.1:19002 weight 100 check
